# Forge V2 Verification — GitHub Actions Workflow
# Copy to .github/workflows/forge-verify.yml in your project
#
# Runs Forge verification engine + drift report on every PR.
# Posts results as PR comment. Fails the check if verification fails.

name: Forge Verification
on:
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Forge Verification
        id: verify
        continue-on-error: true
        run: |
          mkdir -p .forge
          npx forge-tools verify work --json > .forge/verification-result.json 2>&1
          echo "result=$(cat .forge/verification-result.json | jq -r '.overall // "UNKNOWN"')" >> $GITHUB_OUTPUT
          echo "layers=$(cat .forge/verification-result.json | jq -r '.layers | length // 0')" >> $GITHUB_OUTPUT
          echo "duration=$(cat .forge/verification-result.json | jq -r '.total_duration_ms // 0')" >> $GITHUB_OUTPUT

      - name: Run Drift Report
        id: drift
        continue-on-error: true
        run: |
          npx forge-tools drift report --json > .forge/drift-result.json 2>&1
          echo "score=$(cat .forge/drift-result.json | jq -r '.aggregate_drift_score // 0')" >> $GITHUB_OUTPUT
          echo "severity=$(cat .forge/drift-result.json | jq -r '.aggregate_severity // "GREEN"')" >> $GITHUB_OUTPUT

      - name: Generate CI Annotations
        if: always()
        run: |
          npx forge-tools verify work --ci 2>/dev/null || true
          npx forge-tools drift report --ci 2>/dev/null || true

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Forge Verification Report\n\n';

            try {
              const verify = JSON.parse(fs.readFileSync('.forge/verification-result.json', 'utf8'));
              const icon = verify.overall === 'PASS' ? ':white_check_mark:' : ':x:';
              body += `**Overall:** ${icon} ${verify.overall}\n`;
              body += `**Layers checked:** ${(verify.layers || []).length}\n`;
              body += `**Duration:** ${verify.total_duration_ms}ms\n\n`;

              if (verify.layers) {
                body += '| Layer | Status | Duration |\n|---|---|---|\n';
                for (const layer of verify.layers) {
                  const s = layer.skipped ? ':fast_forward: Skip' : (layer.passed ? ':white_check_mark: Pass' : ':x: Fail');
                  body += `| ${layer.name} | ${s} | ${layer.duration_ms}ms |\n`;
                }
              }
            } catch {
              body += '_Verification results not available_\n';
            }

            body += '\n---\n\n';

            try {
              const drift = JSON.parse(fs.readFileSync('.forge/drift-result.json', 'utf8'));
              const color = { GREEN: ':green_circle:', YELLOW: ':yellow_circle:', RED: ':red_circle:' };
              body += `**Drift:** ${color[drift.aggregate_severity] || ':white_circle:'} `;
              body += `${(drift.aggregate_drift_score * 100).toFixed(1)}% (${drift.aggregate_severity})\n`;

              if (drift.per_requirement) {
                const drifting = drift.per_requirement.filter(r => r.drift_score > 0.10);
                if (drifting.length > 0) {
                  body += '\n| Requirement | Drift | Status |\n|---|---|---|\n';
                  for (const r of drifting.slice(0, 10)) {
                    body += `| ${r.requirement_id} | ${(r.drift_score * 100).toFixed(1)}% | ${r.status} |\n`;
                  }
                }
              }
            } catch {
              body += '_Drift report not available_\n';
            }

            body += '\n---\n_Generated by [Forge V2](https://github.com/przemyslawnowakmbm-create/atos-forge-v2)_';

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body?.includes('Forge Verification Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Fail on verification failure
        if: steps.verify.outputs.result != 'PASS' && steps.verify.outputs.result != 'UNKNOWN'
        run: |
          echo "::error::Forge verification failed with result: ${{ steps.verify.outputs.result }}"
          exit 1
